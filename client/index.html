<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link rel="icon" type="image/png" sizes="32x32" href="/logo.png" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icon-512.png" />
    <meta name="theme-color" content="#0C0A16" />
    <meta name="description" content="Athena – AI study companion powered by Gemini. Paste any confusing text, formula, or screenshot and get curated YouTube videos ranked by difficulty." />
    <meta property="og:title" content="Athena – Stop Searching. Start Understanding." />
    <meta property="og:description" content="Paste any confusing text or screenshot. Athena finds the exact YouTube videos that explain it, ranked beginner to advanced. Free." />
    <meta property="og:type" content="website" />
    <title>Athena – AI Study Companion</title>

    <!-- Loader styles -->
    <style>
      body { margin: 0; background: #0C0A16; }
      #athena-loader {
        position: fixed; inset: 0; z-index: 9999;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        background: #0C0A16;
        transition: opacity 0.4s ease, visibility 0.4s ease;
      }
      #athena-loader.fade-out { opacity: 0; visibility: hidden; }
      #athena-loader img {
        width: 56px; height: auto;
        animation: loader-pulse 1.8s ease-in-out infinite;
      }
      #athena-loader .loader-text {
        margin-top: 20px;
        font-family: 'Courier New', monospace;
        font-size: 11px; letter-spacing: 0.25em; text-transform: uppercase;
        color: rgba(240, 237, 255, 0.3);
      }
      #athena-loader .loader-bar {
        margin-top: 16px; width: 120px; height: 2px;
        background: rgba(124, 111, 255, 0.15); overflow: hidden;
      }
      #athena-loader .loader-bar::after {
        content: ''; display: block; width: 40%; height: 100%;
        background: #7C6FFF;
        animation: loader-slide 1.2s ease-in-out infinite;
      }
      @keyframes loader-pulse {
        0%, 100% { opacity: 0.5; transform: scale(0.96); }
        50% { opacity: 1; transform: scale(1); }
      }
      @keyframes loader-slide {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(300%); }
      }
    </style>
  </head>
  <body>
    <!-- Loading screen -->
    <div id="athena-loader">
      <img src="/logo.svg" alt="Athena" />
      <div class="loader-text">Loading</div>
      <div class="loader-bar"></div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      window.addEventListener('DOMContentLoaded', () => {
        const check = setInterval(() => {
          if (document.getElementById('root')?.children.length > 0) {
            clearInterval(check);
            const loader = document.getElementById('athena-loader');
            if (loader) {
              loader.classList.add('fade-out');
              setTimeout(() => loader.remove(), 500);
            }
          }
        }, 50);
        setTimeout(() => {
          const loader = document.getElementById('athena-loader');
          if (loader) { loader.classList.add('fade-out'); setTimeout(() => loader.remove(), 500); }
        }, 5000);
      });
    </script>
  </body>
</html>
